# Render Blueprint — https://render.com/docs/blueprint-spec
version: "1"

services:
  - type: web
    name: chile-climate-dashboard
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: WEB_CONCURRENCY
        value: "2"
